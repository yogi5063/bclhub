<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIP MIS — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" crossorigin href="/assets/login-D2a4to3K.css">
</head>
<body>
  <div class="login-bg">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <span class="logo-fip">FIP</span>
        <span class="logo-mis">MIS</span>
      </div>
      <p class="login-tagline">Management Information System</p>

      <!-- Form -->
      <form id="login-form" autocomplete="on" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            autocomplete="username"
            placeholder="Enter your username"
            spellcheck="false"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="current-password"
              placeholder="Enter your password"
              required
            />
            <button type="button" class="toggle-pw" id="toggle-pw" tabindex="-1" title="Show/hide password">
              <svg id="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>

        <div id="error-msg" class="error-msg hidden"></div>

        <button type="submit" class="btn-login" id="login-btn">
          <span id="btn-text">Sign In</span>
          <span id="btn-spinner" class="spinner hidden"></span>
        </button>
      </form>

      <p class="login-footer">Data stays on your device &mdash; never uploaded to servers</p>
    </div>
  </div>

  <script src="/login.js"></script>
</body>
</html>
